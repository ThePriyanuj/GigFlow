version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: gigflow-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gigflow
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gigflow-network

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gigflow-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/gigflow
      JWT_SECRET: ${JWT_SECRET:-gigflow-super-secret-key-change-in-production}
      CLIENT_URL: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:5000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - gigflow-network

  # Frontend (Nginx)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gigflow-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:80/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - gigflow-network

volumes:
  mongo-data:
    driver: local

networks:
  gigflow-network:
    driver: bridge
